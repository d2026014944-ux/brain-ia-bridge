<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Mind Panel - Forca Sinaptica</title>
  <style>
    :root {
      --bg-1: #0a1325;
      --bg-2: #111f38;
      --ink: #e5ecff;
      --muted: #96a8cf;
      --accent: #43d9bd;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Space Grotesk", "Segoe UI", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(1200px 700px at 20% 15%, #18325a 0%, transparent 60%),
        radial-gradient(1000px 600px at 85% 85%, #142749 0%, transparent 55%),
        linear-gradient(165deg, var(--bg-1), var(--bg-2));
      display: grid;
      place-items: center;
      padding: 16px;
    }
    .card {
      width: min(96vw, 980px);
      border: 1px solid #244166;
      border-radius: 18px;
      padding: 14px 14px 10px 14px;
      background: rgba(9, 18, 35, 0.78);
      backdrop-filter: blur(4px);
      box-shadow: 0 12px 42px rgba(0, 0, 0, 0.45);
    }
    .head {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 10px;
      margin-bottom: 10px;
    }
    .title {
      font-size: clamp(1rem, 2vw, 1.25rem);
      letter-spacing: 0.04em;
      font-weight: 700;
      text-transform: uppercase;
    }
    .meta {
      font-size: 0.9rem;
      color: var(--muted);
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
    }
    .meta strong { color: var(--accent); font-weight: 700; }
    canvas {
      width: 100%;
      aspect-ratio: 1.25;
      border-radius: 12px;
      border: 1px solid #2a4f75;
      background:
        linear-gradient(rgba(255,255,255,0.02), rgba(255,255,255,0.01)),
        repeating-linear-gradient(90deg, rgba(90,140,210,0.06) 0 1px, transparent 1px 48px),
        repeating-linear-gradient(0deg, rgba(90,140,210,0.06) 0 1px, transparent 1px 48px);
    }
    .thought {
      margin-top: 10px;
      padding: 8px 10px;
      border-radius: 10px;
      border: 1px solid #2a4f75;
      background: rgba(8, 20, 40, 0.66);
      color: #dff8f3;
      font-size: 0.9rem;
      letter-spacing: 0.01em;
      min-height: 38px;
    }
  </style>
</head>
<body>
  <section class="card">
    <div class="head">
      <div class="title">Mind Panel · Forca Sinaptica</div>
      <div class="meta">
        <span>learning: <strong id="learning">on</strong></span>
        <span>peso medio: <strong id="wmean">0.000</strong></span>
        <span>ultima atualizacao: <strong id="ts">-</strong></span>
      </div>
    </div>
    <canvas id="mind" width="940" height="720"></canvas>
    <div class="thought" id="thought">[PENSAMENTO]: aguardando pulso causal...</div>
  </section>

  <script>
    const canvas = document.getElementById('mind');
    const ctx = canvas.getContext('2d');
    const learningEl = document.getElementById('learning');
    const wmeanEl = document.getElementById('wmean');
    const tsEl = document.getElementById('ts');
    const thoughtEl = document.getElementById('thought');

        function hashText(text) {
            let h = 2166136261;
            for (let i = 0; i < text.length; i += 1) {
                h ^= text.charCodeAt(i);
                h = Math.imul(h, 16777619);
            }
            return h >>> 0;
        }

        function labelPalette(text) {
            const hue = hashText(text) % 360;
            return {
                text: `hsla(${hue}, 95%, 78%, 0.98)`,
                bg: `hsla(${hue}, 80%, 14%, 0.78)`,
                stroke: `hsla(${hue}, 95%, 66%, 0.75)`,
                glow: `hsla(${hue}, 95%, 65%, 0.42)`,
            };
        }

        function roundRectPath(x, y, width, height, radius) {
            const r = Math.max(0, Math.min(radius, Math.min(width, height) / 2));
            ctx.beginPath();
            ctx.moveTo(x + r, y);
            ctx.lineTo(x + width - r, y);
            ctx.quadraticCurveTo(x + width, y, x + width, y + r);
            ctx.lineTo(x + width, y + height - r);
            ctx.quadraticCurveTo(x + width, y + height, x + width - r, y + height);
            ctx.lineTo(x + r, y + height);
            ctx.quadraticCurveTo(x, y + height, x, y + height - r);
            ctx.lineTo(x, y + r);
            ctx.quadraticCurveTo(x, y, x + r, y);
            ctx.closePath();
        }

        function drawConceptLabel(x, y, text) {
            const palette = labelPalette(text);
            ctx.save();
            ctx.font = '700 12px "Space Grotesk", "Segoe UI", sans-serif';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';

            const metrics = ctx.measureText(text);
            const padX = 8;
            const padY = 4;
            const width = metrics.width + padX * 2;
            const height = 20;
            const rx = x - width / 2;
            const ry = y - height - padY;

            roundRectPath(rx, ry, width, height, 7);
            ctx.fillStyle = palette.bg;
            ctx.shadowBlur = 10;
            ctx.shadowColor = palette.glow;
            ctx.fill();

            roundRectPath(rx, ry, width, height, 7);
            ctx.lineWidth = 1;
            ctx.shadowBlur = 0;
            ctx.strokeStyle = palette.stroke;
            ctx.stroke();

            ctx.fillStyle = palette.text;
            ctx.fillText(text, x, ry + height / 2 + 0.5);
            ctx.restore();
        }

        function buildLayout(nodes) {
            const xs = nodes.map((n) => Number(n.x || 0));
            const ys = nodes.map((n) => Number(n.y || 0));
            const minX = xs.length ? Math.min(...xs) : 0;
            const maxX = xs.length ? Math.max(...xs) : 1;
            const minY = ys.length ? Math.min(...ys) : 0;
            const maxY = ys.length ? Math.max(...ys) : 1;

            const dx = Math.max(1e-6, maxX - minX);
            const dy = Math.max(1e-6, maxY - minY);

      const padX = 90;
      const padY = 60;
      const width = canvas.width - padX * 2;
      const height = canvas.height - padY * 2;

            return {
                toCanvasPos(x, y) {
                    return {
                        x: padX + ((Number(x || 0) - minX) / dx) * width,
                        y: padY + ((Number(y || 0) - minY) / dy) * height,
                    };
                }
      };
    }

    function draw(data) {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      const nodes = data.nodes || [];
      const edges = data.synapses || [];
            const nodeNames = data.nomes || data.node_names || {};
            const nodeById = new Map(nodes.map((n) => [String(n.id), n]));
            const layout = buildLayout(nodes);
        const thoughtSteps = Array.isArray(data.thought_trace?.sequence) ? data.thought_trace.sequence : [];
        const thoughtNodeIds = thoughtSteps.map((step) => String(step.node_id));
        const thoughtNodeSet = new Set(thoughtNodeIds);
        const thoughtEdges = new Set();
        for (let i = 0; i < thoughtNodeIds.length - 1; i += 1) {
            thoughtEdges.add(`${thoughtNodeIds[i]}->${thoughtNodeIds[i + 1]}`);
        }

      for (const edge of edges) {
                const pre = nodeById.get(String(edge.pre_id));
                const post = nodeById.get(String(edge.post_id));
        if (!pre || !post) continue;

                const p1 = layout.toCanvasPos(pre.x, pre.y);
                const p2 = layout.toCanvasPos(post.x, post.y);
        const edgeKey = `${String(edge.pre_id)}->${String(edge.post_id)}`;
        const isThoughtEdge = thoughtEdges.has(edgeKey);
        const w = Math.max(0, Math.min(1, Number(edge.weight || 0)));
        const alpha = isThoughtEdge ? 0.95 : 0.15 + w * 0.75;
        const width = isThoughtEdge ? 4.2 : 0.6 + w * 3.8;

        ctx.beginPath();
        ctx.moveTo(p1.x, p1.y);
        ctx.lineTo(p2.x, p2.y);
        ctx.lineWidth = width;
        ctx.strokeStyle = isThoughtEdge
          ? `rgba(255, 197, 109, ${alpha})`
          : `rgba(67, 217, 189, ${alpha})`;
        ctx.shadowBlur = isThoughtEdge ? 16 : 2 + w * 12;
        ctx.shadowColor = isThoughtEdge
          ? 'rgba(255, 197, 109, 0.85)'
          : `rgba(67, 217, 189, ${0.25 + w * 0.7})`;
        ctx.stroke();
      }

      ctx.shadowBlur = 0;
      for (const node of nodes) {
                const p = layout.toCanvasPos(node.x, node.y);
        const isThoughtNode = thoughtNodeSet.has(String(node.id));
        ctx.beginPath();
        ctx.arc(p.x, p.y, isThoughtNode ? 8.5 : 6, 0, Math.PI * 2);
        ctx.fillStyle = isThoughtNode ? 'rgba(255, 221, 161, 1.0)' : 'rgba(229, 236, 255, 0.95)';
        ctx.fill();

                if (isThoughtNode) {
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, 13, 0, Math.PI * 2);
                    ctx.lineWidth = 1.3;
                    ctx.strokeStyle = 'rgba(255, 197, 109, 0.95)';
                    ctx.stroke();
                }

                const rawLabel =
                    node.name ||
                    node.label ||
                    nodeNames[String(node.id)] ||
                    nodeNames[node.id];

                if (rawLabel) {
                    const label = String(rawLabel);
                    const shortLabel = label.length > 15 ? `${label.slice(0, 14)}...` : label;
                    drawConceptLabel(p.x, p.y - 8, shortLabel);
                }
      }
    }

    async function refresh() {
      try {
        const res = await fetch('/state', { cache: 'no-store' });
        const data = await res.json();

        const syn = data.synapses || [];
        const mean = syn.length ? syn.reduce((acc, s) => acc + Number(s.weight || 0), 0) / syn.length : 0;

        learningEl.textContent = data.learning_enabled ? 'on' : 'off';
        wmeanEl.textContent = mean.toFixed(3);
        tsEl.textContent = new Date((data.timestamp || 0) * 1000).toLocaleTimeString('pt-BR');
        if (data.thought_trace && data.thought_trace.concept_chain) {
          const conf = Number(data.thought_trace.confidence_score || 0);
          const coh = Number(data.thought_trace.coherence_score || 0);
          thoughtEl.textContent = `[PENSAMENTO]: ${data.thought_trace.concept_chain} · conf=${conf.toFixed(3)} · coh=${coh.toFixed(3)}`;
        } else {
          thoughtEl.textContent = '[PENSAMENTO]: aguardando pulso causal...';
        }

        draw(data);
      } catch (_) {
        // Keep last frame if fetch fails momentarily.
      }
    }

    refresh();
    setInterval(refresh, 180);
  </script>
</body>
</html>
